<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Guia de Saúde</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center}
#app{width:100%;max-width:430px;min-height:100vh;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,.08)}
.scr{display:none;flex-direction:column;flex:1;min-height:100vh}
.scr.on{display:flex}

#lov{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
#lov.hide{display:none}
.spin{width:28px;height:28px;border:3px solid #eee;border-top-color:#378ADD;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#lov p{font-size:13px;color:#aaa}

/* LOGIN */
#sl{background:#fff;align-items:stretch;justify-content:center;padding:2.5rem 1.75rem}
.login-head{margin-bottom:2.5rem;text-align:center}
.login-head h1{font-size:26px;font-weight:700;color:#111;letter-spacing:-.5px}
.login-head p{font-size:14px;color:#999;margin-top:6px}
.inp{width:100%;padding:14px 16px;border:1.5px solid #e8e8e8;border-radius:14px;font-size:15px;color:#111;outline:none;transition:border-color .2s;background:#fafafa;margin-bottom:12px}
.inp:focus{border-color:#378ADD;background:#fff}
.inp::placeholder{color:#bbb}
.err{font-size:12px;color:#E24B4A;min-height:18px;margin-bottom:10px;text-align:center}
.lbtn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;background:#111;color:#fff;transition:opacity .15s}
.lbtn:hover{opacity:.85}
.lbtn:active{opacity:.7}

/* HOME */
#sh{background:#f0ede8}
.hdr{padding:1.25rem 1.5rem 1rem;background:#fff;display:flex;align-items:center;justify-content:space-between}
.hdr-left h2{font-size:20px;font-weight:700;color:#111;letter-spacing:-.3px}
.hdr-left p{font-size:12px;color:#aaa;margin-top:2px}
.hdr-out{background:none;border:1.5px solid #eee;border-radius:10px;padding:6px 12px;font-size:12px;color:#aaa;cursor:pointer}
.hdr-out:hover{background:#f5f5f5}
.bars{display:flex;flex-direction:column;gap:12px;padding:16px}

.bar-wrap{position:relative;border-radius:18px;overflow:hidden;cursor:pointer;height:138px;transition:transform .12s,box-shadow .12s;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.bar-wrap:active{transform:scale(.975)}
.bar-bg{position:absolute;inset:0}
.bar-fill{position:absolute;bottom:0;left:0;right:0;transition:height 1.2s cubic-bezier(.4,0,.2,1)}
.bar-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1;padding:1rem}
.bar-name{font-size:24px;font-weight:800;letter-spacing:-.4px}
.bar-pct{font-size:13px;font-weight:600;margin-top:5px;opacity:.85}
.bar-count{font-size:11px;margin-top:3px;opacity:.65;font-weight:500}

/* CATEGORIA */
#sc{background:#fff}
.topbar{display:flex;align-items:center;gap:10px;padding:1rem 1.25rem;border-bottom:1px solid #f2f2f2;flex-shrink:0}
.bbtn{width:34px;height:34px;border-radius:50%;background:#f5f5f5;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;line-height:1;color:#555;flex-shrink:0}
.bbtn:hover{background:#ebebeb}
.tbartit{font-size:16px;font-weight:700;color:#111;letter-spacing:-.2px}
.prog-area{padding:14px 1.25rem 10px;flex-shrink:0}
.prog-track{height:5px;background:#f0f0f0;border-radius:99px;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-lbl{font-size:11px;color:#bbb;margin-top:7px;font-weight:500}
.tlist{overflow-y:auto;flex:1}

.ti{display:flex;align-items:center;gap:14px;padding:.9rem 1.25rem;border-bottom:1px solid #f7f7f7;cursor:pointer;transition:background .1s}
.ti:hover{background:#fafafa}
.ti-left{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.ti-label{font-size:13px;font-weight:700;color:#111;flex:1;line-height:1.5}
.ti-label.done{color:#bbb;font-weight:400}
.ti-arr{color:#ddd;font-size:20px;flex-shrink:0;line-height:1}
.mini-dots{display:flex;gap:3px}
.mini-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid}

/* DETALHE */
#sd{background:#fff}
.dcnt{padding:1.5rem 1.25rem 3rem;overflow-y:auto;flex:1}
.d-ttl{font-size:19px;font-weight:800;color:#111;margin-bottom:1.25rem;line-height:1.45;letter-spacing:-.3px}
.d-body{font-size:14px;line-height:1.95;color:#555}

/* 5 BOLINHAS */
.days-section{margin-top:2rem}
.days-label{font-size:12px;font-weight:600;color:#aaa;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px}
.days-row{display:flex;gap:12px;align-items:center;justify-content:center}
.day-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:none;border:none;padding:0}
.day-circle{width:20px;height:20px;border-radius:50%;border:2.5px solid;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;color:#fff}
.day-circle.empty{background:transparent;color:transparent}
.day-num{font-size:10px;font-weight:600;color:#ccc}
.day-num.checked{color:inherit}

.d-done-badge{margin-top:2rem;padding:1rem;border-radius:14px;text-align:center;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
</style>
</head>
<body>
<div id="lov"><div class="spin"></div><p>Carregando...</p></div>
<div id="app">

  <!-- LOGIN -->
  <div id="sl" class="scr">
    <div class="login-head">
      <h1>Guia de Saúde</h1>
      <p>Programa personalizado de bem-estar</p>
    </div>
    <input class="inp" id="inp-name" placeholder="Seu nome completo" type="text" autocomplete="name">
    <input class="inp" id="inp-email" placeholder="Seu e-mail" type="email" autocomplete="email">
    <div class="err" id="err-msg"></div>
    <button class="lbtn" onclick="doLogin()">Entrar no programa</button>
  </div>

  <!-- HOME -->
  <div id="sh" class="scr">
    <div class="hdr">
      <div class="hdr-left">
        <h2 id="h-name">Olá!</h2>
        <p>Selecione uma área</p>
      </div>
      <button class="hdr-out" onclick="doLogout()">Sair</button>
    </div>
    <div class="bars" id="bars"></div>
  </div>

  <!-- CATEGORIA -->
  <div id="sc" class="scr">
    <div class="topbar">
      <button class="bbtn" onclick="goHome()">&#8592;</button>
      <div class="tbartit" id="c-title"></div>
    </div>
    <div class="prog-area">
      <div class="prog-track"><div class="prog-bar" id="c-pb"></div></div>
      <div class="prog-lbl" id="c-lbl"></div>
    </div>
    <div class="tlist" id="c-list"></div>
  </div>

  <!-- DETALHE -->
  <div id="sd" class="scr">
    <div class="topbar">
      <button class="bbtn" id="d-back">&#8592;</button>
      <div class="tbartit" id="d-catname"></div>
    </div>
    <div class="dcnt">
      <div class="d-ttl" id="d-title"></div>
      <div class="d-body" id="d-body"></div>
      <div class="days-section" id="d-days"></div>
    </div>
  </div>

</div>
<script>
const SB_URL='https://tkvsftpbyqejrumdkoqj.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRrdnNmdHBieXFlanJ1bWRrb3FqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3ODYxMjMsImV4cCI6MjA5MjM2MjEyM30.bhr4MZH0FAJpRoI7THniNp9J59GJfzoUwoHwxZ36mH8';
const sb=supabase.createClient(SB_URL,SB_KEY);

/* ─── CONTEÚDO ─────────────────────────────────────────────────────────────
   Para editar: altere o texto entre as aspas em cada { id, t, c }
   t = título em negrito
   c = explicação completa
   ───────────────────────────────────────────────────────────────────────── */
const CATS=[
  {id:'sono',name:'Sono',full:'#2A87D0',light:'#D6EAF8',text:'#1A5276',topics:[
    {id:1,t:'Mantenha horários regulares de sono',c:'Acordar e dormir nos mesmos horários todos os dias — inclusive fins de semana — é uma das estratégias mais poderosas para regular o ritmo circadiano. Seu corpo possui um relógio biológico interno que controla ciclos de sono e vigília, temperatura corporal, hormônios e metabolismo. Quando você mantém horários consistentes, esse relógio se sincroniza com mais eficiência, tornando o adormecer e o acordar naturais e espontâneos. Mesmo que tenha dormido mal em uma noite, resista ao impulso de compensar dormindo muito mais no dia seguinte — isso pode desfazer o alinhamento circadiano e dificultar o sono nas noites seguintes.'},
    {id:2,t:'Evite cafeína após as 14h',c:'A cafeína é um bloqueador de adenosina, o neurotransmissor responsável pela sensação de sonolência. Sua meia-vida no organismo é de aproximadamente 5 a 7 horas — metade da cafeína de um café das 15h ainda estará no sangue às 20h. Além do café, atenção a fontes ocultas: chá preto, chá verde, refrigerantes à base de cola, cacau, chocolate e alguns medicamentos. Pessoas mais sensíveis devem considerar cortar a cafeína por volta do meio-dia.'},
    {id:3,t:'Crie um ambiente escuro no quarto',c:'A melatonina, o hormônio do sono, é extremamente sensível à luz. Mesmo pequenas fontes — LEDs de aparelhos eletrônicos, luz da rua pela janela, brilho de celular em standby — podem suprimir sua produção e atrasar o início do sono. Invista em cortinas blackout ou use uma máscara de dormir. Cubra indicadores luminosos com fita. Quanto mais escuro o ambiente, mais profundo e restaurador tende a ser o sono.'},
    {id:4,t:'Controle a temperatura do quarto',c:'O corpo precisa reduzir sua temperatura central em aproximadamente 1 a 2°C para iniciar e manter o sono. Quartos quentes dificultam esse processo. A temperatura ideal fica entre 16°C e 20°C. Se o ambiente estiver quente, considere ventilador, ar-condicionado ou roupas de cama mais leves. Tomar um banho morno antes de dormir também ajuda: a vasodilatação periférica dissipa calor e facilita a queda da temperatura corporal.'},
    {id:5,t:'Reduza o uso de telas 1h antes de dormir',c:'A luz azul emitida por smartphones, tablets e computadores suprime a produção de melatonina de forma semelhante à luz solar. Além do componente biológico, o conteúdo consumido nas telas — redes sociais, notícias, vídeos estimulantes — ativa o sistema nervoso e mantém o cérebro em alerta. Estabeleça um corte digital de pelo menos 60 minutos antes de deitar. Substitua por leitura de livro físico, meditação, música suave ou conversa tranquila.'},
    {id:6,t:'Desenvolva uma rotina noturna de relaxamento',c:'O cérebro aprende por associação. Quando você repete consistentemente atividades relaxantes antes de dormir, o organismo interpreta como sinal de que o sono se aproxima. Essa rotina pode incluir um banho morno, leitura, alongamento suave, escrita em diário, meditação ou chá de camomila. O mais importante é a regularidade — o mesmo ritual por pelo menos 2 semanas para consolidar a associação.'},
    {id:7,t:'Evite álcool próximo ao horário de dormir',c:'Embora o álcool tenha efeito sedativo inicial, ele fragmenta o sono nas horas seguintes. Seu metabolismo gera compostos que perturbam as fases profundas e restauradoras do sono (ondas lentas e REM). O resultado: sono superficial, mais despertares noturnos, sonhos vívidos e cansaço ao acordar mesmo após muitas horas na cama. Evite bebidas alcoólicas pelo menos 3 a 4 horas antes de dormir.'},
    {id:8,t:'Não durma com fome nem com excesso alimentar',c:'Dormir com fome pode causar despertares noturnos — o organismo sinaliza necessidade de energia. Por outro lado, refeições volumosas próximas ao horário de dormir sobrecarregam o sistema digestivo e aumentam o risco de refluxo. O ideal é jantar de 2 a 3 horas antes de deitar, com refeições leves. Se sentir fome, um pequeno lanche rico em triptofano (banana, leite morno) pode ajudar sem sobrecarregar a digestão.'},
    {id:9,t:'Pratique exercício físico regularmente',c:'A atividade física regular melhora a qualidade do sono, aumenta o tempo nas fases profundas e reduz o tempo para adormecer. O mecanismo envolve regulação de adenosina, temperatura corporal e ritmo circadiano. Exercícios de moderada intensidade — caminhada, ciclismo, natação — são particularmente benéficos. Treinos muito intensos realizados 1 a 2 horas antes de dormir podem dificultar o sono em pessoas sensíveis.'},
    {id:10,t:'Exponha-se à luz natural pela manhã',c:'A exposição à luz solar logo ao acordar é um dos sinais mais poderosos para sincronizar o relógio biológico. Ela suprime a melatonina residual, aumenta a temperatura corporal e sinaliza ao cérebro que o dia começou — antecipando naturalmente a sonolência para o final do dia. Recomenda-se pelo menos 10 a 30 minutos de exposição nas primeiras horas.'},
    {id:11,t:'Evite cochilos longos durante o dia',c:'Cochilos curtos (10 a 20 minutos) podem aumentar o estado de alerta sem prejudicar o sono noturno. Porém cochilos longos (acima de 45 a 60 minutos) ou no final da tarde reduzem a pressão de sono acumulada — a vontade de dormir que facilita o adormecer à noite. Se você tem dificuldades para dormir à noite, reduza ou elimine os cochilos diurnos como primeira estratégia.'},
    {id:12,t:'Reserve a cama apenas para dormir',c:'Trabalhar, assistir TV, comer ou usar o celular na cama ensina o cérebro a associar o ambiente a atividades de vigília. Esse é um princípio do controle de estímulos, pilar central da terapia cognitivo-comportamental para insônia (TCC-I). Quando você usa a cama exclusivamente para dormir, o cérebro aprende que deitar significa sono, facilitando o adormecer automaticamente.'},
    {id:13,t:'Não fique olhando para o relógio à noite',c:'Verificar as horas durante despertares noturnos alimenta um ciclo de ansiedade: você calcula quanto tempo perdeu, quanto falta para acordar, se vai conseguir dormir — e essa ativação mental prolonga exatamente o estado que quer evitar. Vire o relógio ou coloque-o fora do alcance visual.'},
    {id:14,t:'Gerencie preocupações antes de se deitar',c:'Uma das causas mais comuns de insônia é a mente que não consegue desligar — pensamentos sobre trabalho, problemas, tarefas. Uma estratégia eficaz: reserve 15 a 20 minutos no início da noite (não na cama) para escrever suas preocupações e o que precisa ser feito amanhã. Ao descarregar esses pensamentos no papel, o cérebro tem menos necessidade de processá-los na hora de dormir.'},
    {id:15,t:'Pratique a respiração 4-7-8 para relaxar',c:'A técnica 4-7-8 ativa o sistema nervoso parassimpático com eficácia. Como praticar: inspire pelo nariz contando 4 tempos, segure o ar contando 7 tempos, expire pela boca contando 8 tempos. Repita 4 ciclos. Esse padrão estimula o nervo vago, reduz a frequência cardíaca e a pressão arterial, diminuindo a ativação do sistema simpático.'},
    {id:16,t:'Limite líquidos nas 2 horas antes de dormir',c:'Acordar durante a noite para urinar é uma das causas mais comuns de sono fragmentado. Para minimizar isso, reduza a ingestão de líquidos nas 2 horas que antecedem o sono. Isso não significa desidratar-se — mantenha boa hidratação ao longo do dia, mas concentre a maior parte da ingestão nas horas da manhã e tarde.'},
    {id:17,t:'Mantenha o quarto silencioso ou use ruído branco',c:'Sons intermitentes e imprevisíveis — tráfego, vozes, animais — perturbam o sono mesmo durante fases profundas. Se o ambiente for barulhento, considere tampões de ouvido ou um gerador de ruído branco. O ruído branco funciona por mascaramento: um som contínuo torna os ruídos intermitentes menos perceptíveis ao cérebro.'},
    {id:18,t:'Evite trabalhar no quarto',c:'Levar trabalho para o quarto — notebook, celular, documentos — associa esse ambiente a estresse e estado de vigília. O ideal é que o quarto seja um espaço associado exclusivamente a descanso. Se morar em espaço pequeno, considere cobrir o computador ou criar uma separação visual do espaço de trabalho à noite.'},
    {id:19,t:'Pratique mindfulness ou meditação regularmente',c:'A prática regular de mindfulness reduz a atividade da amígdala e aumenta a capacidade de desengajamento de pensamentos ruminativos. Estudos mostram que 8 semanas de mindfulness (como o MBSR) melhoram significativamente a qualidade do sono e reduzem sintomas de insônia. Comece com 10 a 15 minutos diários.'},
    {id:20,t:'Considere a suplementação de magnésio',c:'O magnésio participa de mais de 300 reações enzimáticas e tem papel importante na regulação do sistema nervoso. Estudos mostram que a suplementação (especialmente nas formas glicinato ou treonato) pode melhorar a qualidade do sono, reduzir o tempo para adormecer e diminuir os níveis de cortisol noturno. Converse com seu nutricionista antes de iniciar qualquer suplementação.'}
  ]},
  {id:'estresse',name:'Estresse',full:'#7B68D4',light:'#EAE7F9',text:'#3D2F9E',topics:[
    {id:1,t:'Diferencie o Estressor da Resposta de Estresse',c:'Compreender a distinção entre o estressor e a sua resposta de estresse é fundamental para o manejo clínico: o estressor é a ameaça externa ou interna (como prazos, conflitos ou autocrítica), enquanto a resposta de estresse é a cascata biológica de cortisol e adrenalina que ocorre internamente. É crucial notar que eliminar ou resolver o problema externo não encerra automaticamente a reação química no seu organismo; o corpo pode continuar em estado de alerta, "embebido" em hormônios de estresse, muito tempo depois de o gatilho ter desaparecido. Portanto, você deve tratar a resposta física como um processo separado, utilizando ações físicas que sinalizem segurança ao sistema nervoso para completar o ciclo fisiológico, independentemente da gestão direta do problema original.'},
    {id:2,t:'Pratique mindfulness por 10 minutos ao dia',c:'Mindfulness é prestar atenção ao momento presente de forma intencional e sem julgamento. Basta observar sua respiração, sensações corporais e pensamentos sem tentar controlá-los. A consistência é mais importante que a duração: 10 minutos diários por 8 semanas produzem mudanças mensuráveis no cérebro, especialmente nas regiões associadas ao estresse e à regulação emocional.'},
    {id:3,t:'Movimente seu corpo com regularidade',c:'O exercício físico é um dos mais eficazes redutores de estresse disponíveis. Durante a atividade, o cérebro libera endorfinas, serotonina e dopamina, que elevam o humor e reduzem a ansiedade. O exercício também metaboliza hormônios do estresse como cortisol e adrenalina. Uma caminhada de 30 minutos já é suficiente para produzir efeitos mensuráveis no humor.'},
    {id:4,t:'Cultive conexões sociais de qualidade',c:'Relacionamentos saudáveis são um dos maiores fatores protetores contra o estresse crônico. A interação social positiva estimula a liberação de ocitocina, hormônio que reduz o cortisol e promove sensação de segurança. Invista em conexões que te nutrem — conversas presentes, atividades compartilhadas, expressão emocional autêntica.'},
    {id:5,t:'Escreva em um diário regularmente',c:'A escrita expressiva — colocar em palavras pensamentos e emoções sobre experiências estressantes — reduz a carga cognitiva e emocional associada a elas. Pesquisas do psicólogo James Pennebaker mostram que escrever sobre experiências difíceis por 15 a 20 minutos durante 3 a 4 dias melhora o bem-estar psicológico e fortalece o sistema imunológico.'},
    {id:6,t:'Estabeleça limites com notificações digitais',c:'Verificações constantes de e-mail, mensagens e redes sociais fragmentam a atenção e mantêm o sistema nervoso em estado de alerta contínuo. Estabeleça blocos de tempo para verificar mensagens em vez de responder a cada notificação. Desative notificações desnecessárias. Tenha períodos sem telefone — especialmente pela manhã e antes de dormir.'},
    {id:7,t:'Passe tempo na natureza regularmente',c:'A exposição a ambientes naturais — parques, florestas, praias — reduz os níveis de cortisol, pressão arterial e frequência cardíaca, e melhora o humor e a função cognitiva. O conceito japonês de shinrin-yoku (banho de floresta) é respaldado por extensa pesquisa mostrando benefícios já com 20 minutos em ambiente verde.'},
    {id:8,t:'Dedique tempo a hobbies prazerosos',c:'Atividades realizadas pelo puro prazer — sem pressão de performance ou resultado — são essenciais para a saúde mental. Elas ativam o sistema de recompensa do cérebro, reduzem o estresse e restauram a energia mental. O estado de flow — absorção total em uma atividade desafiadora mas agradável — é especialmente restaurador.'},
    {id:9,t:'Gerencie seu tempo com prioridades claras',c:'Sentir-se constantemente sobrecarregado e sem controle é uma das principais fontes de estresse. Escreva as 3 tarefas mais importantes do dia. Use a Matriz de Eisenhower para separar o urgente do importante. Aprenda a dizer não a compromissos desalinhados com suas prioridades.'},
    {id:10,t:'Use a técnica de aterramento 5-4-3-2-1',c:'Quando sentir estresse agudo, identifique: 5 coisas que você pode VER, 4 que pode TOCAR, 3 que pode OUVIR, 2 que pode CHEIRAR, 1 que pode PROVAR. O processo de observação sensorial desativa a ruminação mental e ancora a consciência no aqui e agora, quebrando o ciclo de pensamentos ansiosos.'},
    {id:11,t:'Tome um banho relaxante à noite',c:'Um banho morno 1 a 2 horas antes de dormir combina dois benefícios: relaxamento muscular e mental, e a queda de temperatura corporal que se segue — facilitando o início do sono. Use o tempo no banho como uma transição intencional entre o modo produção do dia e o modo repouso da noite.'},
    {id:12,t:'Use música e arte como regulação emocional',c:'Músicas lentas e suaves reduzem frequência cardíaca, pressão arterial e cortisol de forma direta. Criar playlists para diferentes estados emocionais é uma estratégia simples e acessível de regulação. Atividades artísticas como desenho, pintura e escrita criativa também funcionam como descargas emocionais e ativam estados de flow.'},
    {id:13,t:'Pratique gratidão diariamente',c:'Escrever 3 coisas pelas quais você é grato ao final do dia redireciona o foco cognitivo do que está errado para o que está funcionando. Pesquisas mostram que práticas regulares de gratidão aumentam o bem-estar, melhoram o sono e fortalecem relacionamentos. Seja específico — a gratidão concreta é mais eficaz que a genérica.'},
    {id:14,t:'Estabeleça limites saudáveis nas relações',c:'Dificuldade em dizer não, assumir responsabilidades alheias e tolerar comportamentos que te fazem mal são fontes silenciosas de estresse crônico. Limites saudáveis não são muros — são comunicações claras sobre o que você pode e quer oferecer. Praticar assertividade é uma habilidade que pode ser desenvolvida com prática.'},
    {id:15,t:'Priorize o sono como pilar do gerenciamento do estresse',c:'Estresse e sono têm uma relação bidirecional: o estresse perturba o sono, e a privação do sono amplifica a resposta ao estresse. Dormir mal eleva os níveis de cortisol, reduz a regulação emocional e aumenta a reatividade a estressores cotidianos. Priorizar o sono não é um luxo — é uma estratégia fundamental de gerenciamento do estresse.'}
  ]},
  {id:'alimentacao',name:'Alimentação',full:'#3E9142',light:'#DCF0DD',text:'#1E5C20',topics:[
    {id:1,t:'Mastigue bem os alimentos',c:'A digestão começa na boca. Mastigar adequadamente — cerca de 20 a 30 vezes por garfada — quebra mecanicamente o alimento e o mistura com saliva, que contém enzimas digestivas que iniciam a digestão de carboidratos. Mastigação eficiente reduz o trabalho do estômago, diminui o risco de gases e desconforto digestivo, melhora a absorção de nutrientes e favorece a saciedade — o cérebro leva cerca de 20 minutos para registrar que o estômago está cheio.'},
    {id:2,t:'Hidrate-se adequadamente ao longo do dia',c:'A hidratação adequada é fundamental para praticamente todas as funções fisiológicas: transporte de nutrientes, regulação da temperatura, função renal, saúde intestinal e cognição. A recomendação geral é de 35 ml por kg de peso ao dia. Prefira água pura; chás de ervas sem açúcar também contam. Sinal de hidratação adequada: urina amarelo claro a transparente.'},
    {id:3,t:'Consuma fibras em abundância',c:'As fibras alimentares são essenciais para saúde intestinal, controle glicêmico, saciedade e microbiota. Fibras solúveis (aveia, maçã, feijão, linhaça) formam um gel que retarda a absorção de glicose e colesterol. Fibras insolúveis (vegetais, cereais integrais) aumentam o volume do bolo fecal. A recomendação é de 25 a 38g/dia.'},
    {id:4,t:'Inclua variedade de cores no prato',c:'As cores dos vegetais indicam diferentes classes de compostos bioativos com propriedades antioxidantes e anti-inflamatórias. Vermelho (tomate, morango): licopeno. Laranja/amarelo (cenoura, abóbora): betacaroteno. Verde (espinafre, brócolis): clorofila, folato. Roxo/azul (beterraba, uva): antocianinas. Quanto mais variado o arco-íris no prato, maior a diversidade de proteção nutricional.'},
    {id:5,t:'Inclua proteína em todas as refeições',c:'A proteína é o macronutriente com maior poder de saciedade, além de ser essencial para manutenção muscular, produção de enzimas, hormônios e anticorpos. Distribuir a ingestão proteica ao longo do dia maximiza a síntese proteica muscular. Boas fontes: carnes magras, ovos, peixe, leguminosas, laticínios com pouca gordura, tofu e tempeh. Objetive pelo menos 20 a 30g de proteína por refeição principal.'},
    {id:6,t:'Inclua gorduras saudáveis na alimentação',c:'As gorduras são essenciais para absorção de vitaminas lipossolúveis (A, D, E, K), produção de hormônios e saúde cardiovascular. Prefira gorduras monoinsaturadas (azeite de oliva, abacate, castanhas) e poli-insaturadas ômega-3 (peixes de águas frias, chia, linhaça). O azeite de oliva extra virgem é especialmente valorizado por seus polifenóis anti-inflamatórios.'},
    {id:7,t:'Reduza o consumo de ultraprocessados',c:'Ultraprocessados são formulações industriais com múltiplos aditivos e substâncias com pouco valor nutricional: refrigerantes, salgadinhos, biscoitos recheados, macarrão instantâneo, embutidos. Estão associados a maior risco de obesidade, diabetes tipo 2, doenças cardiovasculares e disbiose intestinal. Estratégia prática: cozinhe mais, leia rótulos e priorize alimentos com poucos ingredientes reconhecíveis.'},
    {id:8,t:'Mantenha horários regulares para as refeições',c:'Comer em horários regulares melhora a eficiência digestiva, estabiliza a glicemia e regula hormônios de fome e saciedade (grelina e leptina). Pular refeições e comer de forma irregular pode gerar hipoglicemia, compulsão alimentar e desregulação metabólica.'},
    {id:9,t:'Pratique comer com atenção plena',c:'O comer mindful significa prestar atenção à experiência de comer: sabores, texturas, aromas, sensações de fome e saciedade — sem distrações como tela ou trabalho. Comer distraído é uma das principais causas de excessos alimentares. Comece com uma refeição por dia sem tela, sentado, apreciando o alimento.'},
    {id:10,t:'Cuide da sua saúde intestinal',c:'A microbiota intestinal influencia digestão, imunidade, humor, cognição e metabolismo. Para nutri-la: aumente a diversidade de fibras vegetais; consuma alimentos fermentados regularmente (iogurte natural, kefir, chucrute, kimchi); minimize o uso desnecessário de antibióticos; reduza ultraprocessados e açúcar.'},
    {id:11,t:'Consuma vegetais e verduras em quantidade',c:'Vegetais e verduras são densos em nutrientes e pobres em calorias — oferecem vitaminas, minerais, fibras e fitoquímicos com baixo impacto calórico. A recomendação da OMS é de pelo menos 400g/dia de frutas e vegetais. Estratégia prática: encha metade do prato com vegetais em cada refeição principal.'},
    {id:12,t:'Prefira frutas como sobremesa e lanche',c:'Frutas são fontes de vitaminas, minerais, fibras e antioxidantes, além de açúcares naturais acompanhados de fibra — o que reduz o impacto glicêmico comparado ao açúcar refinado. A fruta inteira é sempre preferível ao suco (mesmo natural), pois mantém as fibras intactas.'},
    {id:13,t:'Reduza o consumo de açúcar adicionado',c:'O açúcar adicionado está associado a ganho de peso, resistência à insulina e inflamação. A OMS recomenda limitar o açúcar livre a menos de 10% das calorias diárias. Leia os rótulos e identifique os disfarces do açúcar: xarope de glicose-frutose, maltodextrina, dextrose, sacarose.'},
    {id:14,t:'Faça um jantar leve e nutritivo',c:'O metabolismo desacelera durante a noite. Jantares volumosos e ricos em carboidratos refinados sobrecarregam o organismo em um período de menor gasto energético. O jantar ideal: proteína de qualidade + vegetais variados + gordura saudável. Comer com pelo menos 2 horas de antecedência ao sono é uma boa prática.'},
    {id:15,t:'Planeje suas refeições semanalmente',c:'O planejamento alimentar é uma das ferramentas mais eficazes para manter uma alimentação saudável de forma consistente. Reserve 20 a 30 minutos no final de semana para definir o cardápio da semana, fazer uma lista de compras organizada e preparar alimentos com antecedência (batch cooking).'}
  ]},
  {id:'exercicio',name:'Exercício',full:'#C0392B',light:'#FADADD',text:'#7B241C',topics:[
    {id:1,t:'Pratique 150 minutos de atividade moderada por semana',c:'As diretrizes da OMS recomendam pelo menos 150 a 300 minutos de atividade aeróbica de intensidade moderada por semana. Atividade moderada é aquela em que você respira mais rápido mas ainda consegue conversar: caminhada rápida, ciclismo leve, natação tranquila, dança. Esses 150 minutos podem ser divididos livremente — 30 minutos em 5 dias, por exemplo.'},
    {id:2,t:'Faça treino de força pelo menos 2 vezes por semana',c:'O treinamento de força é recomendado 2 a 3 vezes por semana para todos os adultos. Seus benefícios: manutenção de massa muscular, aumento da taxa metabólica de repouso, melhora da densidade óssea, controle glicêmico e redução de risco de quedas e fraturas. Exercícios com peso corporal (flexões, agachamentos, prancha) já são suficientes para iniciantes.'},
    {id:3,t:'Alongue-se diariamente',c:'O alongamento regular mantém os músculos elásticos, reduz tensão acumulada — especialmente em trapézio, lombar e isquiotibiais — melhora a postura e reduz o risco de lesões. 10 a 15 minutos de alongamento ao final de qualquer atividade física já produzem benefícios significativos.'},
    {id:4,t:'Faça caminhadas leves após as refeições',c:'Uma caminhada de 10 a 15 minutos após as refeições principais tem efeitos metabólicos significativos: reduz os picos de glicose pós-prandial, melhora a sensibilidade à insulina, favorece a digestão e ajuda a prevenir a sonolência pós-refeição.'},
    {id:5,t:'Aumente o NEAT — movimento no cotidiano',c:'NEAT (Non-Exercise Activity Thermogenesis) é o gasto calórico de todas as atividades físicas que não são exercícios formais. Em pessoas sedentárias, pode responder por 15 a 50% do gasto energético total. Estratégias simples: prefira escadas a elevadores, estacione mais longe, levante-se a cada 45 a 60 minutos quando trabalhar sentado.'},
    {id:6,t:'Pratique exercício ao ar livre quando possível',c:'Exercitar-se em ambientes naturais oferece benefícios adicionais: exposição à luz natural (regulação circadiana e síntese de vitamina D), redução do estresse por contato com a natureza e maior motivação. Estudos mostram maior satisfação e adesão a longo prazo em exercícios ao ar livre.'},
    {id:7,t:'Priorize consistência acima de intensidade',c:'O erro mais comum é começar com intensidade excessiva, acumular dor muscular intensa e abandonar em 2 a 3 semanas. Para iniciantes, a regra mais importante é: frequência antes de intensidade. Uma caminhada diária de 30 minutos por um ano inteiro supera em benefícios qualquer regime intenso mantido por um mês.'},
    {id:8,t:'Respeite o descanso e a recuperação',c:'O músculo se fortalece durante o descanso, não durante o treino. Sem descanso adequado, ocorre excesso de treinamento: queda de performance, maior risco de lesões, fadiga crônica e imunossupressão. Para iniciantes: pelo menos 1 a 2 dias de descanso ativo por semana.'},
    {id:9,t:'Hidrate-se antes, durante e após o exercício',c:'A desidratação de apenas 2% do peso corporal já compromete significativamente a performance física e cognitiva. Beba 500ml de água 2 horas antes do exercício; durante, 150 a 250ml a cada 15 a 20 minutos; após, reponha o que foi perdido pela transpiração.'},
    {id:10,t:'Faça aquecimento antes de treinar',c:'O aquecimento prepara progressivamente o organismo para o esforço: aumenta a temperatura muscular, eleva gradualmente a frequência cardíaca e respiratória, melhora a lubrificação articular e reduz o risco de lesões. Um bom aquecimento dura 5 a 10 minutos com movimentos dinâmicos.'},
    {id:11,t:'Exercite-se em grupo ou com um parceiro',c:'A motivação e a adesão a longo prazo são significativamente maiores quando há componente social no exercício. Um parceiro de treino gera responsabilidade mútua e compromisso social que vai além da força de vontade individual. Aulas em grupo combinam exercício com conexão social.'},
    {id:12,t:'Varie as modalidades de exercício',c:'Fazer sempre o mesmo tipo de exercício leva a adaptação e platô — o corpo se torna mais eficiente e o estímulo diminui. Combine modalidades: aeróbico + força + flexibilidade + equilíbrio. Essa variedade promove uma aptidão física mais completa e mantém o interesse a longo prazo.'},
    {id:13,t:'Monitore sua frequência cardíaca durante o exercício',c:'A frequência cardíaca máxima estimada é de 220 menos a idade. Para saúde geral, a zona de 60 a 75% da frequência máxima é a mais recomendada. Smartwatches e monitores de pulso facilitam esse acompanhamento.'},
    {id:14,t:'Inclua exercícios de mobilidade na sua rotina',c:'Exercícios de mobilidade — especialmente para quadril, ombros, torácica e tornozelos — melhoram a postura, reduzem dores crônicas, previnem lesões e tornam os movimentos do cotidiano mais eficientes. 10 minutos de trabalho de mobilidade ao acordar é um investimento com alto retorno.'},
    {id:15,t:'Aprenda a escutar os sinais do seu corpo',c:'O exercício deve produzir desafio — algum desconforto é esperado. Mas há diferença fundamental entre dor muscular tardia (normal) e dor articular aguda ou persistente (sinal de alerta). Respeitar os limites do corpo não é fraqueza — é inteligência necessária para treinar por anos sem lesões.'}
  ]}
];

let patient=null, prog={}, curCat=null, curTopic=null;
const $=id=>document.getElementById(id);
function loading(v){$('lov').className=v?'':'hide';}
function showScr(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));$(id).classList.add('on');}

function getDays(catId,tid){return(prog[catId]&&prog[catId][tid])||[];}
function isComplete(catId,tid){return getDays(catId,tid).length>=5;}
function getPct(cid){
  const c=CATS.find(x=>x.id===cid);
  const done=c.topics.filter(t=>isComplete(cid,t.id)).length;
  return Math.round((done/c.topics.length)*100);
}
function countDone(cid){
  const c=CATS.find(x=>x.id===cid);
  return c.topics.filter(t=>isComplete(cid,t.id)).length;
}

async function init(){
  loading(true);
  const saved=localStorage.getItem('hg-patient');
  if(saved){
    patient=JSON.parse(saved);
    await loadProg();
    renderHome();
    showScr('sh');
  }else{showScr('sl');}
  loading(false);
}

async function doLogin(){
  const name=$('inp-name').value.trim();
  const email=$('inp-email').value.trim().toLowerCase();
  const err=$('err-msg');
  if(!name){err.textContent='Digite seu nome.';return;}
  if(!email||!email.includes('@')){err.textContent='Digite um e-mail válido.';return;}
  err.textContent='';loading(true);
  try{
    const {error}=await sb.from('patients').upsert({email,name},{onConflict:'email'});
    if(error)throw error;
    patient={email,name};
    localStorage.setItem('hg-patient',JSON.stringify(patient));
    await loadProg();renderHome();showScr('sh');
  }catch(e){$('err-msg').textContent='Erro ao entrar. Verifique sua conexão.';console.error(e);}
  loading(false);
}

async function loadProg(){
  try{
    const {data,error}=await sb.from('progress').select('category,topic_id,day_number').eq('patient_email',patient.email);
    if(error)throw error;
    prog={};
    (data||[]).forEach(r=>{
      if(!prog[r.category])prog[r.category]={};
      if(!prog[r.category][r.topic_id])prog[r.category][r.topic_id]=[];
      if(!prog[r.category][r.topic_id].includes(r.day_number))
        prog[r.category][r.topic_id].push(r.day_number);
    });
  }catch(e){console.error(e);}
}

function renderHome(){
  $('h-name').textContent='Olá, '+patient.name.split(' ')[0]+'!';
  $('bars').innerHTML=CATS.map(cat=>{
    const pct=getPct(cat.id);
    const done=countDone(cat.id);
    const total=cat.topics.length;
    return `<div class="bar-wrap" onclick="openCat('${cat.id}')">
      <div class="bar-bg" style="background:${cat.light}"></div>
      <div class="bar-fill" style="background:${cat.full};height:${pct}%"></div>
      <div class="bar-content">
        <div class="bar-name" style="color:${cat.text}">${cat.name}</div>
        <div class="bar-pct" style="color:${cat.text}">${pct}% concluído</div>
        <div class="bar-count" style="color:${cat.text}">${done} de ${total} orientações</div>
      </div>
    </div>`;
  }).join('');
}

function goHome(){renderHome();showScr('sh');}

function openCat(catId){
  curCat=CATS.find(c=>c.id===catId);
  const pct=getPct(catId);
  const done=countDone(catId);
  $('c-title').textContent=curCat.name;
  $('c-title').style.color=curCat.text;
  $('c-pb').style.width=pct+'%';
  $('c-pb').style.background=curCat.full;
  $('c-lbl').textContent=done+' de '+curCat.topics.length+' orientações concluídas · '+pct+'%';
  $('c-list').innerHTML=curCat.topics.map(tp=>{
    const days=getDays(catId,tp.id);
    const complete=days.length>=5;
    const dotsHtml=Array.from({length:5},(_,i)=>{
      const filled=days.includes(i+1);
      return `<div class="mini-dot" style="background:${filled?curCat.full:'transparent'};border-color:${curCat.full}"></div>`;
    }).join('');
    return `<div class="ti" onclick="openTopic(${tp.id})">
      <div class="ti-left">
        <div class="mini-dots">${dotsHtml}</div>
        <div style="font-size:9px;color:${curCat.text};opacity:.6;font-weight:600">${days.length}/5</div>
      </div>
      <div class="ti-label${complete?' done':''}">${tp.t}</div>
      <div class="ti-arr">›</div>
    </div>`;
  }).join('');
  showScr('sc');
}

function openTopic(tid){
  curTopic=curCat.topics.find(t=>t.id===tid);
  const days=getDays(curCat.id,tid);
  const complete=days.length>=5;
  $('d-catname').textContent=curCat.name;
  $('d-catname').style.color=curCat.text;
  $('d-title').textContent=curTopic.t;
  $('d-body').textContent=curTopic.c;
  renderDays(tid,days,complete);
  $('d-back').onclick=()=>openCat(curCat.id);
  showScr('sd');
}

function renderDays(tid,days,complete){
  if(complete){
    $('d-days').innerHTML=`<div class="d-done-badge" style="background:${curCat.light};color:${curCat.text}">✓ &nbsp;Orientação concluída — 5/5 dias</div>`;
    return;
  }
  const circles=Array.from({length:5},(_,i)=>{
    const day=i+1;
    const filled=days.includes(day);
    return `<button class="day-btn" onclick="toggleDay(${tid},${day})" ${filled?'disabled':''}>
      <div class="day-circle ${filled?'':'empty'}" style="background:${filled?curCat.full:'transparent'};border-color:${curCat.full}">
        ${filled?'✓':''}
      </div>
      <div class="day-num ${filled?'checked':''}" style="${filled?'color:'+curCat.full:''}">${filled?'dia '+day:day+'º dia'}</div>
    </button>`;
  }).join('');
  $('d-days').innerHTML=`
    <div class="days-label">Marque cada dia que praticar</div>
    <div class="days-row">${circles}</div>
    <div style="font-size:11px;color:#bbb;text-align:center;margin-top:14px">${days.length}/5 dias concluídos</div>`;
}

async function toggleDay(tid,day){
  const days=getDays(curCat.id,tid);
  if(days.includes(day))return;
  // Otimista: atualiza localmente primeiro
  if(!prog[curCat.id])prog[curCat.id]={};
  if(!prog[curCat.id][tid])prog[curCat.id][tid]=[];
  prog[curCat.id][tid].push(day);
  const newDays=getDays(curCat.id,tid);
  renderDays(tid,newDays,newDays.length>=5);
  try{
    await sb.from('progress').insert({patient_email:patient.email,category:curCat.id,topic_id:tid,day_number:day});
  }catch(e){
    // Reverte se falhar
    prog[curCat.id][tid]=prog[curCat.id][tid].filter(d=>d!==day);
    renderDays(tid,getDays(curCat.id,tid),false);
    console.error(e);
  }
}

function doLogout(){
  localStorage.removeItem('hg-patient');
  patient=null;prog={};
  $('inp-name').value='';$('inp-email').value='';$('err-msg').textContent='';
  showScr('sl');
}

init();
</script>
